<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#39FF14"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1a0f"/>
      <stop offset="50%" stop-color="#4a2a15"/>
      <stop offset="100%" stop-color="#3a2010"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background circle with glow -->
  <circle cx="256" cy="256" r="240" fill="#0a0a14" stroke="url(#neonGrad)" stroke-width="3" opacity="0.9"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="#39FF14" stroke-width="1" opacity="0.2" filter="url(#glow)"/>
  
  <!-- Mesh network lines (background) -->
  <g opacity="0.15" stroke="#39FF14" stroke-width="1">
    <line x1="80" y1="120" x2="200" y2="180"/>
    <line x1="200" y1="180" x2="350" y2="140"/>
    <line x1="350" y1="140" x2="430" y2="200"/>
    <line x1="80" y1="350" x2="180" y2="320"/>
    <line x1="180" y1="320" x2="300" y2="380"/>
    <line x1="300" y1="380" x2="420" y2="340"/>
    <circle cx="80" cy="120" r="4" fill="#39FF14"/>
    <circle cx="200" cy="180" r="4" fill="#00E5FF"/>
    <circle cx="350" cy="140" r="4" fill="#39FF14"/>
    <circle cx="430" cy="200" r="4" fill="#00E5FF"/>
    <circle cx="80" cy="350" r="4" fill="#00E5FF"/>
    <circle cx="180" cy="320" r="4" fill="#39FF14"/>
    <circle cx="300" cy="380" r="4" fill="#00E5FF"/>
    <circle cx="420" cy="340" r="4" fill="#39FF14"/>
  </g>
  
  <!-- Ferret body -->
  <g transform="translate(256, 260)">
    <!-- Tail (bouncy curve) -->
    <path d="M-20,40 C-60,20 -80,-20 -70,-60 C-65,-80 -40,-85 -30,-70 C-20,-55 -35,-30 -25,10" 
          fill="url(#bodyGrad)" stroke="#5a3a20" stroke-width="2"/>
    
    <!-- Body -->
    <ellipse cx="0" cy="10" rx="55" ry="45" fill="url(#bodyGrad)" stroke="#5a3a20" stroke-width="1.5"/>
    
    <!-- Belly (lighter) -->
    <ellipse cx="5" cy="20" rx="30" ry="25" fill="#6a4a25" opacity="0.6"/>
    
    <!-- Back legs -->
    <ellipse cx="-25" cy="45" rx="18" ry="12" fill="#3a2010" stroke="#5a3a20" stroke-width="1"/>
    <ellipse cx="25" cy="45" rx="18" ry="12" fill="#3a2010" stroke="#5a3a20" stroke-width="1"/>
    
    <!-- Front paws -->
    <ellipse cx="-30" cy="50" rx="10" ry="6" fill="#2a1a0f"/>
    <ellipse cx="30" cy="50" rx="10" ry="6" fill="#2a1a0f"/>
    
    <!-- Head -->
    <ellipse cx="45" cy="-25" rx="40" ry="35" fill="url(#bodyGrad)" stroke="#5a3a20" stroke-width="1.5"/>
    
    <!-- Face mask (lighter area) -->
    <ellipse cx="55" cy="-20" rx="22" ry="18" fill="#7a5a30" opacity="0.5"/>
    
    <!-- Ears -->
    <ellipse cx="25" cy="-55" rx="12" ry="18" fill="#4a2a15" stroke="#5a3a20" stroke-width="1" transform="rotate(-15, 25, -55)"/>
    <ellipse cx="60" cy="-58" rx="12" ry="18" fill="#4a2a15" stroke="#5a3a20" stroke-width="1" transform="rotate(10, 60, -58)"/>
    <!-- Inner ears -->
    <ellipse cx="25" cy="-53" rx="7" ry="11" fill="#8a5a30" transform="rotate(-15, 25, -53)"/>
    <ellipse cx="60" cy="-56" rx="7" ry="11" fill="#8a5a30" transform="rotate(10, 60, -56)"/>
    
    <!-- Eyes (neon glow!) -->
    <circle cx="38" cy="-30" r="8" fill="#111" stroke="#39FF14" stroke-width="1.5"/>
    <circle cx="60" cy="-28" r="8" fill="#111" stroke="#39FF14" stroke-width="1.5"/>
    <circle cx="38" cy="-30" r="4" fill="#39FF14" filter="url(#softGlow)"/>
    <circle cx="60" cy="-28" r="4" fill="#39FF14" filter="url(#softGlow)"/>
    <!-- Eye highlights -->
    <circle cx="36" cy="-32" r="2" fill="#fff" opacity="0.8"/>
    <circle cx="58" cy="-30" r="2" fill="#fff" opacity="0.8"/>
    
    <!-- Nose -->
    <ellipse cx="72" cy="-18" rx="5" ry="4" fill="#1a0a05"/>
    
    <!-- Mouth -->
    <path d="M68,-12 C70,-10 74,-10 76,-12" stroke="#1a0a05" stroke-width="1.5" fill="none"/>
    
    <!-- Whiskers -->
    <g stroke="#8a7a6a" stroke-width="0.8" opacity="0.6">
      <line x1="75" y1="-22" x2="100" y2="-28"/>
      <line x1="76" y1="-18" x2="102" y2="-18"/>
      <line x1="75" y1="-14" x2="100" y2="-10"/>
    </g>
    
    <!-- Signal waves from ferret (bouncing!) -->
    <g filter="url(#softGlow)">
      <path d="M85,-25 C95,-35 95,-15 85,-25" stroke="#39FF14" stroke-width="2" fill="none" opacity="0.6">
        <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M95,-30 C110,-45 110,-10 95,-30" stroke="#00E5FF" stroke-width="1.5" fill="none" opacity="0.4">
        <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" begin="0.3s" repeatCount="indefinite"/>
      </path>
      <path d="M105,-35 C125,-55 125,-5 105,-35" stroke="#39FF14" stroke-width="1" fill="none" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.05;0.3" dur="2s" begin="0.6s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
  
  <!-- "AiFER" text -->
  <text x="256" y="440" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="42" letter-spacing="4">
    <tspan fill="url(#neonGrad)">AiFER</tspan>
  </text>
  <text x="256" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-weight="400" font-size="12" fill="#39FF14" opacity="0.5" letter-spacing="6">THE BOUNCING FERRET</text>
</svg>
